services:
  relay:
    # Pull prebuilt image from GitHub Container Registry
    image: ghcr.io/openconduit/relay-server:latest
    # Or build from source:
    # build: .
    ports:
      - "3000:3000"
    environment:
      BASE_URL: ${BASE_URL:-http://localhost:3000}
      PORT: 3000
      DB_PATH: /app/data/relay.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped
